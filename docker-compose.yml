services:
  postgres:
    image: postgres:16-alpine
    container_name: jobtracker-postgres
    environment:
      POSTGRES_DB: jobtracker
      POSTGRES_USER: jobtracker
      POSTGRES_PASSWORD: jobtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: jobtracker-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: jobtracker
      RABBITMQ_DEFAULT_PASS: jobtracker

  redis:
    image: redis:7-alpine
    container_name: jobtracker-redis
    ports:
      - "6379:6379"

  seq:
    image: datalust/seq:latest
    container_name: jobtracker-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:80"

volumes:
  postgres_data:
